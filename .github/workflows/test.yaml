name: Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Meta Extractor
          uses: nookyo/qubership-workflow-hub/actions/meta-extractor@main
          with:
            template: 'SNAPSHOT-{{combined}}-v{{minor}}.{{major}}.{{patch}}'