name: Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Meta Extractor
          uses: nookyo/qubership-workflow-hub/actions/github-metadata@main
          with:
            template: 'SNAPSHOT-{{combine}}-v{{major}}.{{minor}}.{{patch}}-{{tag}}-{{ sha }}'
            branch-template: '{
                                "main":"{{ref_name}}.{{sha}}",
                                "release":"v{{major}}.{{minor}}.{{patch}}",
                                "develop":"SNAPSHOT-{{combine}}"
                              }'


                # main: {{ref_name}}.{{sha}}
                # release: v{{major}}.{{minor}}.{{patch}}
                # develop: SNAPSHOT-{{combine}}


